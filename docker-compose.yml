services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawd-ui-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/tonic/.openclaw/workspace:/home/tonic/.openclaw/workspace:rw
      - /home/tonic/.openclaw/workspace-tonic-ai-tech:/home/tonic/.openclaw/workspace-tonic-ai-tech:rw
      - /home/tonic/.openclaw/workspace-tonic-ai-workflow:/home/tonic/.openclaw/workspace-tonic-ai-workflow:rw
      - /tmp/openclaw:/tmp/openclaw:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_PORT=${BACKEND_PORT:-3001}
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key-32chars}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - OPENCLAW_GATEWAY_URL=http://127.0.0.1:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - CLAWDECK_AGENTS=${CLAWDECK_AGENTS:-main}
      - WORKSPACE_MAIN=${WORKSPACE_MAIN:-}
      - WORKSPACE_TONIC_AI_TECH=${WORKSPACE_TONIC_AI_TECH:-}
      - WORKSPACE_TONIC_AI_WORKFLOW=${WORKSPACE_TONIC_AI_WORKFLOW:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    container_name: clawd-ui-frontend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_INTERNAL_URL=http://localhost:3001
      - NEXT_PUBLIC_BACKEND_URL=http://100.79.10.35:3001
    depends_on:
      backend:
        condition: service_healthy
