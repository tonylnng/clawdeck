# ClawDeck docker-compose.yml
# Generated by install.sh on Sat Mar 14 01:24:55 HKT 2026


services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawdeck-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/tonic/.openclaw/workspace:/home/tonic/.openclaw/workspace:rw
      - /home/tonic/.openclaw/workspace-tonic-ai-tech:/home/tonic/.openclaw/workspace-tonic-ai-tech:rw
      - /home/tonic/.openclaw/workspace-tonic-ai-workflow:/home/tonic/.openclaw/workspace-tonic-ai-workflow:rw
      - /home/tonic/.openclaw/agents:/home/tonic/.openclaw/agents:rw
      - /tmp/openclaw:/tmp/openclaw:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_PORT=${BACKEND_PORT:-3001}
      - FRONTEND_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - CLAWDECK_AGENTS=${CLAWDECK_AGENTS}
      - WORKSPACE_MAIN=${WORKSPACE_MAIN}
      - WORKSPACE_TONIC_AI_TECH=${WORKSPACE_TONIC_AI_TECH}
      - WORKSPACE_TONIC_AI_WORKFLOW=${WORKSPACE_TONIC_AI_WORKFLOW}
      - OPENCLAW_HOME=/home/tonic
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    container_name: clawdeck-frontend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_INTERNAL_URL=http://localhost:3001
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
    depends_on:
      backend:
        condition: service_healthy
